<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MySite - Tailwind CSS</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-800">

  <!-- Navbar -->
  <header class="bg-blue-600 text-white">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <h1 class="text-lg font-semibold">MySite</h1>

      <!-- Menu Desktop -->
      <nav class="hidden md:flex space-x-6 text-sm">
        <a href="#" class="hover:text-blue-200 transition">Home</a>
        <a href="#" class="hover:text-blue-200 transition">About</a>
        <a href="#" class="hover:text-blue-200 transition">Contact</a>
      </nav>

      <!-- Icon Mobile -->
      <button id="menu-toggle" class="md:hidden text-2xl" aria-expanded="false" aria-controls="mobile-menu">
        &#9776;
      </button>
    </div>

    <!-- Mobile Menu -->
    <nav id="mobile-menu" class="md:hidden hidden border-t border-blue-500/40 bg-blue-600/95">
      <div class="px-4 py-3 space-y-2 text-sm">
        <a href="#" class="block hover:text-blue-200 transition">Home</a>
        <a href="#" class="block hover:text-blue-200 transition">About</a>
        <a href="#" class="block hover:text-blue-200 transition">Contact</a>
      </div>
    </nav>
  </header>

  <!-- Hero Section -->
  <main class="max-w-6xl mx-auto px-6 py-16">
    <section class="flex flex-col md:flex-row items-center justify-center gap-10 md:gap-20">
      
      <!-- Left -->
      <div class="flex justify-center">
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/d/d5/Tailwind_CSS_Logo.svg"
          alt="Tailwind CSS Logo"
          class="w-32 md:w-44"
        />
      </div>

      <!-- Right -->
      <div class="text-center md:text-left max-w-md">
        <h2 class="text-3xl md:text-4xl font-bold mb-4">
          Learn Tailwind CSS
        </h2>
        <p class="text-gray-600 mb-6">
          Build responsive layouts quickly with utility-first CSS.
        </p>
        <a
          href="#"
          class="inline-block bg-blue-600 text-white px-6 py-3 rounded-lg shadow hover:bg-blue-700 transition duration-300"
        >
          Get Started
        </a>
      </div>

    </section>
  </main>

  <script>
    const toggleBtn = document.getElementById('menu-toggle');
    const mobileMenu = document.getElementById('mobile-menu');

    toggleBtn?.addEventListener('click', () => {
      const isHidden = mobileMenu.classList.toggle('hidden');
      toggleBtn.setAttribute('aria-expanded', (!isHidden).toString());
    });
  </script>
</body>
</html>
